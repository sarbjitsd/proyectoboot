<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="Ponte en contacto conmigo para proyectos o colaboraciones."
    />
    <title>Contacto | Mi Portafolio</title>
  </head>
  <body>
    <header>
      <nav>
        <a href="index.html" class="logo"><strong>SS</strong></a>

        <ul>
          <li><a href="#">About</a></li>
          <li><a href="#">Skills</a></li>

          <li><a href="#">Recursos</a></li>
          <li><a href="contacto.html">Contacto</a></li>
        </ul>
      </nav>
    </header>

    <main>
      <section>
        <h1>Contacto</h1>
        <p>
          ¿Tienes alguna pregunta o propuesta? Escríbeme a través del siguiente
          formulario.
        </p>

        <fieldset>
          <form action="#" method="POST">
            <div>
              <label for="nombre">Nombre:</label>
              <input type="text" id="nombre" name="nombre" required />
            </div>

            <div>
              <label for="email">Correo electrónico:</label>
              <input type="email" id="email" name="email" required />
            </div>

            <div>
              <label for="asunto">Asunto:</label>
              <input type="text" id="asunto" name="asunto" required />
            </div>

            <div>
              <label for="mensaje">Mensaje:</label>
              <textarea
                id="mensaje"
                name="mensaje"
                rows="20"
                cols="50"
                required
              ></textarea>
            </div>

            <button type="submit">Enviar Mensaje</button>
          </form>
        </fieldset>
      </section>
    </main>
    <footer>
      <p>&copy; 2026 Sarbjit - Todos los derechos reservados.</p>
    </footer>
  </body>
</html>
